// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext{
        camerax_version = '1.0.0-beta01'
        firebase_analytics='17.2.3'
        firebase_crashlytics='17.0.0-beta02'
        fragment_version= '1.2.3'
        glide_version= '4.11.0'
        koin_version = '2.0.1'
        kotlin_version = '1.3.70'
        lifecycle_version = '2.2.0'
        lifecycle_version_kt = '2.2.0'
        logging_version = "3.11.0"
        material_version = "1.1.0"
        navigation_version = '2.3.0-alpha04'
        picasso_version = "2.71828"
        retrofit_version = "2.6.3"
        room_version = "2.2.4"
        service_location = '17.0.0'
        timber_version = '4.7.1'
    }
    repositories {
        google()
        jcenter()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:3.6.1'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        classpath "androidx.navigation:navigation-safe-args-gradle-plugin:$navigation_version"
        classpath 'com.google.gms:google-services:4.3.3'
        classpath 'com.google.firebase:firebase-crashlytics-gradle:2.0.0-beta03'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

allprojects {
    repositories {
        google()
        jcenter()
        
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
